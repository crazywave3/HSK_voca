<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HSK 플래시카드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    color: #1a1a1a;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
    color: #111;
  }

  /* 급수 탭 */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: #666;
  }
  .tab:hover { border-color: #999; color: #333; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* 진행 표시 */
  .progress-bar {
    width: 100%;
    max-width: 480px;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }

  /* 카드 영역 */
  .card-area {
    width: 100%;
    max-width: 480px;
    perspective: 1200px;
    margin-bottom: 28px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    padding-top: 60%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .card-front {
    background: #1a1a1a;
    border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
  .card-back {
    background: #fff;
    border: 1.5px solid #e8e8e8;
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .hanzi-front {
    font-size: clamp(48px, 12vw, 88px);
    font-weight: 400;
    color: #fff;
    line-height: 1;
  }
  .hint {
    margin-top: 16px;
    font-size: 13px;
    color: #666;
  }

  .hanzi-back {
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 400;
    color: #111;
    line-height: 1;
    margin-bottom: 14px;
  }
  .pinyin {
    font-size: clamp(18px, 5vw, 28px);
    color: #666;
    letter-spacing: 0.5px;
  }

  /* 버튼 영역 */
  .nav-btns {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: #333;
  }
  .btn:hover { background: #f0f0f0; border-color: #bbb; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #333; }

  /* 셔플 버튼 */
  .shuffle-btn {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #666;
    transition: all 0.15s;
  }
  .shuffle-btn:hover { border-color: #999; color: #333; }

  /* 완료 화면 */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }
  .done-screen .big { font-size: 48px; }
  .done-screen h2 { font-size: 22px; font-weight: 700; }
  .done-screen p { font-size: 15px; color: #666; }

  @media (max-width: 480px) {
    body { padding: 16px 12px 32px; }
    .tab { padding: 7px 15px; font-size: 13px; }
  }
</style>
</head>
<body>

<h1>HSK 플래시카드</h1>

<div class="tabs">
  <button class="tab active" data-level="hsk1" onclick="setLevel('hsk1', this)">HSK 1급</button>
  <button class="tab" data-level="hsk2" onclick="setLevel('hsk2', this)">HSK 2급</button>
  <button class="tab" data-level="hsk3" onclick="setLevel('hsk3', this)">HSK 3급</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>

<div class="card-area" id="cardArea">
  <div class="card-inner" id="cardInner" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="hanzi-front" id="cardFront"></div>
      <div class="hint">터치하면 뒤집기</div>
    </div>
    <div class="card-face card-back">
      <div class="hanzi-back" id="cardBackHanzi"></div>
      <div class="pinyin" id="cardBackPinyin"></div>
    </div>
  </div>
</div>

<div class="nav-btns">
  <button class="btn" onclick="prevCard()">← 이전</button>
  <button class="btn primary" onclick="nextCard()">다음 →</button>
</div>

<button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>

<div class="done-screen" id="doneScreen">
  <div class="big">🎉</div>
  <h2>완료!</h2>
  <p id="doneText"></p>
  <button class="btn primary" style="max-width:200px" onclick="restart()">처음부터</button>
</div>

let level = 'hsk1';
let deck = [];
let idx = 0;
let flipped = false;

function parsePinyin(back) {
  const m = back.match(/\[(.+)\]$/);
  return m ? m[1] : '';
}

function setLevel(l, btn) {
  level = l;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.tab[data-level="${l}"]`).classList.add('active');
  deck = [...RAW[l]];
  idx = 0;
  showCard();
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
}

function showCard() {
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  const card = deck[idx];
  document.getElementById('cardFront').textContent = card.front;
  document.getElementById('cardBackHanzi').textContent = card.front;
  document.getElementById('cardBackPinyin').textContent = parsePinyin(card.back);
  const pct = Math.round((idx + 1) / deck.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${deck.length}`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

function nextCard() {
  if (idx < deck.length - 1) {
    idx++;
    showCard();
  } else {
    showDone();
  }
}

function prevCard() {
  if (idx > 0) { idx--; showCard(); }
}

function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  showCard();
}

function showDone() {
  document.getElementById('cardArea').style.display = 'none';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = 'none');
  document.querySelector('.progress-bar').style.display = 'none';
  document.querySelector('.progress-text').style.display = 'none';
  const names = {hsk1:'HSK 1급', hsk2:'HSK 2급', hsk3:'HSK 3급'};
  document.getElementById('doneText').textContent = `${names[level]} 단어 ${deck.length}개를 모두 학습했습니다!`;
  document.getElementById('doneScreen').style.display = 'flex';
}

function restart() {
  deck = [...RAW[level]];
  idx = 0;
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
  showCard();
}

// 키보드
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// 스와이프
let touchX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { if (dx < 0) nextCard(); else prevCard(); }
}, {passive:true});

setLevel('hsk1', document.querySelector('.tab[data-level="hsk1"]'));
</script>
