<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HSK 플래시카드</title>
<style>
  @font-face {
    font-family: 'SimSun';
    src: url('https://raw.githubusercontent.com/crazywave3/HSK_voca/main/font_ZH/simsun.ttc') format('truetype');
    font-weight: normal;
  }
  @font-face {
    font-family: 'SimSun';
    src: url('https://raw.githubusercontent.com/crazywave3/HSK_voca/main/font_ZH/simsunb.ttf') format('truetype');
    font-weight: bold;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 40px; color: #1a1a1a;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; color: #111; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab {
    padding: 8px 20px; border-radius: 20px; border: 1.5px solid #ddd;
    background: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: #666;
  }
  .tab:hover { border-color: #999; color: #333; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .progress-bar {
    width: 100%; max-width: 480px; height: 4px; background: #e0e0e0;
    border-radius: 2px; margin-bottom: 12px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; transition: width 0.3s ease; }
  .progress-text { font-size: 13px; color: #888; margin-bottom: 24px; }
  .card-area { width: 100%; max-width: 480px; perspective: 1200px; margin-bottom: 28px; }
  .card-inner {
    position: relative; width: 100%; padding-top: 65%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
    padding: 24px;
  }
  .card-front {
    background: #1a1a1a; border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
  .card-back {
    background: #fff; border: 1.5px solid #e8e8e8;
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    justify-content: space-between;
  }
  .hanzi-front { font-size: clamp(48px, 12vw, 88px); font-weight: 400; color: #fff; line-height: 1; font-family: 'SimSun', serif; }
  .hint { margin-top: 16px; font-size: 13px; color: #666; }
  .back-top {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; width: 100%;
  }
  .hanzi-back { font-size: clamp(36px, 9vw, 64px); font-weight: 400; color: #111; line-height: 1; margin-bottom: 12px; font-family: 'SimSun', serif; }
  .pinyin { font-size: clamp(16px, 4.5vw, 26px); color: #666; letter-spacing: 0.5px; }
  .divider { width: 100%; height: 1px; background: #e8e8e8; flex-shrink: 0; }
  .example {
    width: 100%; padding: 14px 4px 0;
    font-size: clamp(22px, 6vw, 27px); color: #444;
    line-height: 1.6; text-align: center; letter-spacing: 0.3px;
    flex-shrink: 0; cursor: pointer; font-family: 'SimSun', serif;
  }
  .nav-btns { display: flex; gap: 12px; width: 100%; max-width: 480px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd;
    background: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: #333;
  }
  .btn:hover { background: #f0f0f0; border-color: #bbb; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #333; }
  .shuffle-btn {
    margin-top: 16px; padding: 10px 24px; border-radius: 20px;
    border: 1.5px solid #ddd; background: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer; color: #666; transition: all 0.15s;
  }
  .shuffle-btn:hover { border-color: #999; color: #333; }
  .done-screen {
    display: none; flex-direction: column; align-items: center;
    gap: 16px; width: 100%; max-width: 480px; text-align: center;
  }
  .done-screen .big { font-size: 48px; }
  .done-screen h2 { font-size: 22px; font-weight: 700; }
  .done-screen p { font-size: 15px; color: #666; }

  .card-example-detail {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #fff; border: 1.5px solid #e8e8e8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transform: rotateY(0deg);
    cursor: pointer;
  }
  .ex-sentence { font-size: clamp(20px, 5.5vw, 28px); color: #111; line-height: 1.5; text-align: center; font-family: 'SimSun', serif; margin-bottom: 10px; }
  .ex-pinyin   { font-size: clamp(14px, 3.5vw, 18px); color: #666; letter-spacing: 0.3px; text-align: center; margin-bottom: 10px; }
  .ex-korean   { font-size: clamp(15px, 4vw, 20px); color: #333; text-align: center; line-height: 1.5; }
  .card-inner.show-detail .card-front  { pointer-events: none; }
  .card-inner.show-detail .card-back   { pointer-events: none; }
  @media (max-width: 480px) {
    body { padding: 16px 12px 32px; }
    .tab { padding: 7px 15px; font-size: 13px; }
  }
</style>
</head>
<body>
<h1>HSK 플래시카드</h1>
<div class="tabs">
  <button class="tab active" data-level="hsk1" onclick="setLevel('hsk1', this)">HSK 1급</button>
  <button class="tab" data-level="hsk2" onclick="setLevel('hsk2', this)">HSK 2급</button>
  <button class="tab" data-level="hsk3" onclick="setLevel('hsk3', this)">HSK 3급</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>
<div class="card-area" id="cardArea">
  <div class="card-inner" id="cardInner" onclick="handleCardClick()">
    <div class="card-face card-front">
      <div class="hanzi-front" id="cardFront"></div>
      <div class="hint">터치하면 뒤집기</div>
    </div>
    <div class="card-face card-back">
      <div class="back-top">
        <div class="hanzi-back" id="cardBackHanzi"></div>
        <div class="pinyin" id="cardBackPinyin"></div>
      </div>
      <div class="divider"></div>
      <div class="example" id="cardExample" onclick="copyExample(event)"></div>
    </div>
  </div>
  <div class="card-example-detail" id="cardDetail" style="display:none;" onclick="handleDetailClick()">
    <div class="ex-sentence" id="detailSentence"></div>
    <div class="ex-pinyin"   id="detailPinyin"></div>
    <div class="ex-korean"   id="detailKorean"></div>
  </div>
</div>
<div class="nav-btns">
  <button class="btn" onclick="prevCard()">← 이전</button>
  <button class="btn primary" onclick="nextCard()">다음 →</button>
</div>
<button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
<div class="done-screen" id="doneScreen">
  <div class="big">🎉</div>
  <h2>완료!</h2>
  <p id="doneText"></p>
  <button class="btn primary" style="max-width:200px" onclick="restart()">처음부터</button>
</div>
<script>
const RAW = {"hsk1": [{"front": "爱", "back": "爱 [ài]", "examples": [{"sentence": "我爱我的家人。", "pinyin": "Wǒ ài wǒ de jiārén。", "korean": "나는 나의 가족을 사랑합니다."}, {"sentence": "她爱吃苹果。", "pinyin": "Tā ài chī píngguǒ.", "korean": "그녀는 사과 먹는 것을 좋아한다."}, {"sentence": "他非常爱他的工作。", "pinyin": "Tā fēicháng ài tā de gōngzuò.", "korean": "그는 자신의 일을 매우 사랑한다."}]}, {"front": "八", "back": "八 [bā]", "examples": [{"sentence": "桌子上有八个苹果。", "pinyin": "Zhuōzi shàng yǒu bā gè píngguǒ.", "korean": "책상 위에 사과가 여덟 개 있다."}, {"sentence": "我们班有八个女生。", "pinyin": "Wǒmen bān yǒu bā gè nǚshēng.", "korean": "우리 반에는 여학생이 여덟 명 있습니다."}, {"sentence": "他八岁开始学汉语。", "pinyin": "Tā bā suì kāishǐ xué Hànyǔ.", "korean": "그는 여덟 살부터 중국어를 배우기 시작했다."}]}, {"front": "爸爸", "back": "爸爸 [bàba]", "examples": [{"sentence": "我爸爸是医生。", "pinyin": "Wǒ bàba shì yīshēng.", "korean": "우리 아버지는 의사입니다."}, {"sentence": "爸爸每天早上送我去学校。", "pinyin": "Bàba měitiān zǎoshang sòng wǒ qù xuéxiào。", "korean": "아빠는 매일 아침 나를 학교에 데려다 주신다."}, {"sentence": "爸爸喜欢喝茶。", "pinyin": "Bàba xǐhuān hē chá.", "korean": "아빠는 차 마시는 것을 좋아한다."}]}, {"front": "杯子", "back": "杯子 [bēizi]", "examples": [{"sentence": "杯子里有茶。", "pinyin": "Bēizi lǐ yǒu chá.", "korean": "컵 안에 차가 있다."}, {"sentence": "这个杯子是我的。", "pinyin": "Zhège bēizi shì wǒ de。", "korean": "이 컵은 제 것입니다."}, {"sentence": "请给我一个杯子。", "pinyin": "Qǐng gěi wǒ yī gè bēizi。", "korean": "컵 하나 주세요."}]}, {"front": "北京", "back": "北京 [Běijīng]", "examples": [{"sentence": "我住在北京。", "pinyin": "Wǒ zhù zài Běijīng。", "korean": "나는 베이징에 살고 있습니다."}, {"sentence": "北京是中国的首都。", "pinyin": "Běijīng shì Zhōngguó de shǒudū.", "korean": "베이징은 중국의 수도입니다."}, {"sentence": "他去年去北京旅游了。", "pinyin": "Tā qùnián qù Běijīng lǚyóu le.", "korean": "그는 작년에 베이징에 여행을 갔다."}]}, {"front": "本", "back": "本 [běn]", "examples": [{"sentence": "桌子上有一本书。", "pinyin": "Zhuōzi shàng yǒu yī běn shū.", "korean": "책상 위에 책 한 권이 있습니다."}, {"sentence": "我有三本汉语书。", "pinyin": "Wǒ yǒu sān běn Hànyǔ shū.", "korean": "저는 중국어 책이 세 권 있습니다."}, {"sentence": "她借了我两本书。", "pinyin": "나는 숙제를 다 끝내야 밖에 나가서 놀 수 있다."}, {"sentence": "今天老师布置了很多作业。", "pinyin": "Jīntiān lǎoshī bùzhì le hěn duō zuòyè.", "korean": "오늘 선생님이 숙제를 많이 내주셨다."}, {"sentence": "她认真地完成了每一份作业。", "pinyin": "Tā rènzhēn de wánchéng le měi yī fèn zuòyè。", "korean": "그녀는 성실하게 모든 과제를 완성했다."}]}, {"front": "中文", "back": "中文 [Zhōngwén]", "examples": [{"sentence": "他能用中文写信了。", "pinyin": "Tā néng yòng zhōngwén xiě xìn le。", "korean": "그는 중국어로 편지를 쓸 수 있게 되었다."}, {"sentence": "她的中文越来越好，可以看中文书了。", "pinyin": "Tā de Zhōngwén yuè lái yuè hǎo, kěyǐ kàn Zhōngwén shū le.", "korean": "그녀의 중국어 실력이 점점 좋아져서, 중국어 책을 읽을 수 있게 되었다."}, {"sentence": "这家店的菜单有中文版。", "pinyin": "Zhè jiā diàn de càidān yǒu zhōngwén bǎn.", "korean": "이 가게의 메뉴판에는 중국어 버전이 있습니다."}]}, {"front": "饱", "back": "饱 [bǎo]", "examples": [{"sentence": "我吃饱了，不用再盛了。", "pinyin": "Wǒ chī bǎo le, bùyòng zài chéng le.", "korean": "배불리 먹었으니, 더 이상 퍼주지 않아도 돼요."}, {"sentence": "他吃了很多，已经饱了。", "pinyin": "Tā chī le hěn duō, yǐjīng bǎo le.", "korean": "그는 많이 먹어서 이미 배가 불렀다."}, {"sentence": "你吃饱了吗？", "pinyin": "Nǐ chī bǎo le ma?", "korean": "밥 먹었어요? (배불리 드셨나요?)"}]}, {"front": "半", "back": "半 [bàn]", "examples": [{"sentence": "现在是三点半。", "pinyin": "Xiànzài shì sān diǎn bàn。", "korean": "지금은 3시 반입니다."}, {"sentence": "他走了半个小时才到学校。", "pinyin": "Tā zǒu le bàn gè xiǎoshí cái dào xuéxiào.", "korean": "그는 30분을 걸어서야 겨우 학교에 도착했다."}, {"sentence": "我每天学习汉语一个半小时。", "pinyin": "Wǒ měitiān xuéxí Hànyǔ yī gè bàn xiǎoshí.", "korean": "나는 매일 중국어를 한 시간 반 동안 공부한다."}]}, {"front": "层", "back": "层 [céng]", "examples": [{"sentence": "我住在五层。", "pinyin": "Wǒ zhù zài wǔ céng。", "korean": "저는 5층에 살고 있습니다."}, {"sentence": "这栋楼一共有二十层。", "pinyin": "Zhè dòng lóu yīgòng yǒu èrshí céng.", "korean": "이 건물은 총 20층입니다."}, {"sentence": "图书馆在三层。", "pinyin": "Túshūguǎn zài sān céng.", "korean": "도서관은 3층에 있습니다."}]}, {"front": "花", "back": "花 [huā]", "examples": [{"sentence": "桌子上放着一束花。", "pinyin": "Zhuōzi shàng fàngzhe yī shù huā.", "korean": "탁자 위에 꽃 한 다발이 놓여 있다."}, {"sentence": "她喜欢在家里养花。", "pinyin": "Tā xǐhuān zài jiālǐ yǎng huā.", "korean": "그녀는 집에서 꽃을 키우는 것을 좋아한다."}, {"sentence": "他花了很多时间准备这次考试。", "pinyin": "Tā huā le hěn duō shíjiān zhǔnbèi zhè cì kǎoshì.", "korean": "그는 이번 시험을 준비하는 데 많은 시간을 들였다."}]}]};
let level = 'hsk1', deck = [], idx = 0;
let isShuffled = false;

let cardState = 0; // 0=앞면, 1=뒷면, 2=예문상세
let currentExIdx = 0;

function parsePinyin(back) {
  const m = back.match(/\[(.+)\]$/);
  return m ? m[1] : '';
}

function handleCardClick() {
  if (cardState === 0) {
    // 1→2: 앞면에서 뒷면으로 (3D 플립)
    cardState = 1;
    document.getElementById('cardInner').classList.add('flipped');
  } else if (cardState === 1) {
    // 2→3: 뒷면에서 예문상세로 (애니메이션 없이 즉시)
    cardState = 2;
    const card = deck[idx];
    const ex = card.examples[currentExIdx];
    document.getElementById('detailSentence').textContent = ex.sentence;
    document.getElementById('detailPinyin').textContent   = ex.pinyin;
    document.getElementById('detailKorean').textContent   = ex.korean;
    // 카드 즉시 숨기고 상세 표시
    document.getElementById('cardInner').style.visibility = 'hidden';
    document.getElementById('cardDetail').style.display   = 'flex';
    document.getElementById('cardDetail').style.position  = 'absolute';
    document.getElementById('cardDetail').style.inset     = '0';
  }
}

function handleDetailClick() {
  // 3→1: 예문상세에서 다시 앞면으로 (애니메이션 없이 즉시)
  cardState = 0;
  const inner = document.getElementById('cardInner');
  inner.style.transition = 'none';
  inner.classList.remove('flipped');
  inner.style.visibility = 'visible';
  document.getElementById('cardDetail').style.display = 'none';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { inner.style.transition = ''; });
  });
}
function setLevel(l, btn) {
  level = l;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.tab[data-level="${l}"]`).classList.add('active');
  deck = [...RAW[l]];
  for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
  idx = 0; isShuffled = true;
  showCard();
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
}
function showCard() {
  cardState = 0;
  const inner = document.getElementById('cardInner');
  inner.style.transition = 'none';
  inner.classList.remove('flipped');
  inner.style.visibility = 'visible';
  document.getElementById('cardDetail').style.display = 'none';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { inner.style.transition = ''; });
  });
  const card = deck[idx];
  document.getElementById('cardFront').textContent = card.front;
  document.getElementById('cardBackHanzi').textContent = card.front;
  document.getElementById('cardBackPinyin').textContent = parsePinyin(card.back);
  // 예문 랜덤 선택
  currentExIdx = Math.floor(Math.random() * card.examples.length);
  document.getElementById('cardExample').textContent = card.examples[currentExIdx].sentence;
  const pct = Math.round((idx + 1) / deck.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${deck.length}`;
}

function copyExample(e) {
  e.stopPropagation();
  const text = document.getElementById('cardExample').textContent;
  if (!text) return;
  const el = document.getElementById('cardExample');
  navigator.clipboard.writeText(text)
    .then(() => {
      el.style.color = '#2e75b6';
      setTimeout(() => { el.style.color = ''; }, 600);
    })
    .catch(() => {
      // clipboard 미지원 환경 대비 fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      el.style.color = '#2e75b6';
      setTimeout(() => { el.style.color = ''; }, 600);
    });
}
function nextCard() {
  if (idx < deck.length - 1) { idx++; showCard(); } else showDone();
}
function prevCard() {
  if (idx > 0) { idx--; showCard(); }
}
function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; isShuffled = true; showCard();
}
function showDone() {
  document.getElementById('cardArea').style.display = 'none';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = 'none');
  document.querySelector('.progress-bar').style.display = 'none';
  document.querySelector('.progress-text').style.display = 'none';
  const names = {hsk1:'HSK 1급', hsk2:'HSK 2급', hsk3:'HSK 3급'};
  document.getElementById('doneText').textContent = `${names[level]} 단어 ${deck.length}개를 모두 학습했습니다!`;
  document.getElementById('doneScreen').style.display = 'flex';
}
function restart() {
  deck = [...RAW[level]]; idx = 0; isShuffled = false;
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
  showCard();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); handleCardClick(); }
});
let touchX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { if (dx < 0) nextCard(); else prevCard(); }
}, {passive: true});
setLevel('hsk1', document.querySelector('.tab[data-level="hsk1"]'));
</script>
