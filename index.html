<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HSK 플래시카드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 40px; color: #1a1a1a;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; color: #111; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab {
    padding: 8px 20px; border-radius: 20px; border: 1.5px solid #ddd;
    background: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: #666;
  }
  .tab:hover { border-color: #999; color: #333; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .progress-bar {
    width: 100%; max-width: 480px; height: 4px; background: #e0e0e0;
    border-radius: 2px; margin-bottom: 12px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; transition: width 0.3s ease; }
  .progress-text { font-size: 13px; color: #888; margin-bottom: 24px; }
  .card-area { width: 100%; max-width: 480px; perspective: 1200px; margin-bottom: 28px; }
  .card-inner {
    position: relative; width: 100%; padding-top: 65%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
    padding: 24px;
  }
  .card-front {
    background: #1a1a1a; border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
  .card-back {
    background: #fff; border: 1.5px solid #e8e8e8;
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    justify-content: space-between;
  }
  .hanzi-front { font-size: clamp(48px, 12vw, 88px); font-weight: 400; color: #fff; line-height: 1; }
  .hint { margin-top: 16px; font-size: 13px; color: #666; }
  .back-top {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; width: 100%;
  }
  .hanzi-back { font-size: clamp(36px, 9vw, 64px); font-weight: 400; color: #111; line-height: 1; margin-bottom: 12px; }
  .pinyin { font-size: clamp(16px, 4.5vw, 26px); color: #666; letter-spacing: 0.5px; }
  .divider { width: 100%; height: 1px; background: #e8e8e8; flex-shrink: 0; }
  .example {
    width: 100%; padding: 14px 4px 0;
    font-size: clamp(22px, 6vw, 27px); color: #444;
    line-height: 1.6; text-align: center; letter-spacing: 0.3px;
    flex-shrink: 0; cursor: pointer;
  }
  .nav-btns { display: flex; gap: 12px; width: 100%; max-width: 480px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd;
    background: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: #333;
  }
  .btn:hover { background: #f0f0f0; border-color: #bbb; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #333; }
  .shuffle-btn {
    margin-top: 16px; padding: 10px 24px; border-radius: 20px;
    border: 1.5px solid #ddd; background: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer; color: #666; transition: all 0.15s;
  }
  .shuffle-btn:hover { border-color: #999; color: #333; }
  .done-screen {
    display: none; flex-direction: column; align-items: center;
    gap: 16px; width: 100%; max-width: 480px; text-align: center;
  }
  .done-screen .big { font-size: 48px; }
  .done-screen h2 { font-size: 22px; font-weight: 700; }
  .done-screen p { font-size: 15px; color: #666; }
  @media (max-width: 480px) {
    body { padding: 16px 12px 32px; }
    .tab { padding: 7px 15px; font-size: 13px; }
  }
</style>
</head>
<body>
<h1>HSK 플래시카드</h1>
<div class="tabs">
  <button class="tab active" data-level="hsk1" onclick="setLevel('hsk1', this)">HSK 1급</button>
  <button class="tab" data-level="hsk2" onclick="setLevel('hsk2', this)">HSK 2급</button>
  <button class="tab" data-level="hsk3" onclick="setLevel('hsk3', this)">HSK 3급</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>
<div class="card-area" id="cardArea">
  <div class="card-inner" id="cardInner" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="hanzi-front" id="cardFront"></div>
      <div class="hint">터치하면 뒤집기</div>
    </div>
    <div class="card-face card-back">
      <div class="back-top">
        <div class="hanzi-back" id="cardBackHanzi"></div>
        <div class="pinyin" id="cardBackPinyin"></div>
      </div>
      <div class="divider"></div>
      <div class="example" id="cardExample" onclick="copyExample(event)"></div>
    </div>
  </div>
</div>
<div class="nav-btns">
  <button class="btn" onclick="prevCard()">← 이전</button>
  <button class="btn primary" onclick="nextCard()">다음 →</button>
</div>
<button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
<div class="done-screen" id="doneScreen">
  <div class="big">🎉</div>
  <h2>완료!</h2>
  <p id="doneText"></p>
  <button class="btn primary" style="max-width:200px" onclick="restart()">처음부터</button>
</div>
<script>
const RAW = {"hsk1": [{"front": "爱", "back": "爱 [ài]", "examples": ["我爱我的家人。", "她爱自己的孩子胜过一切。", "他们相爱了十年，终于结婚了。"]}, {"front": "八", "back": "八 [bā]", "examples": ["他儿子今年八岁了。", "我们班一共有八个男生。", "他每天早上八点出发去上班。"]}, {"front": "爸爸", "back": "爸爸 [bàba]", "examples": ["我爸爸是医生。", "爸爸每天早上送我去学校。", "爸爸工作很忙，但是每天都陪我吃晚饭。"]}, {"front": "杯子", "back": "杯子 [bēizi]", "examples": ["杯子里有茶。", "这个杯子是我最喜欢的。", "这个杯子是妈妈送给我的，我很喜欢。"]}, {"front": "北京", "back": "北京 [Běijīng]", "examples": ["我住在北京。", "北京是中国的首都，有很多历史古迹。", "他来北京已经三年了，很喜欢这个城市。"]}, {"front": "本", "back": "本 [běn]", "examples": ["桌子上有一本书。", "她借了我三本书。", "我一个月看完了这本三百页的书。"]}, {"front": "不", "back": "不 [bù]", "examples": ["我不是学生。", "今天不冷，不用穿大衣。", "他说不去，但是最后还是去了。"]}, {"front": "不客气", "back": "不客气 [búkèqi]", "examples": ["甲:谢谢你！乙:不客气。", "甲:真的很感谢你！乙:不客气，应该的。", "帮助朋友是应该的，真的不客气。"]}, {"front": "菜", "back": "菜 [cài]", "examples": ["今天我做了三个菜。", "妈妈做的菜真好吃。", "这家餐厅有很多种菜，不知道点哪个好。"]}, {"front": "茶", "back": "茶 [chá]", "examples": ["请喝杯茶吧。", "他每天早上都喝一杯茶。", "中国人喝茶的历史很长。"]}, {"front": "吃", "back": "吃 [chī]", "examples": ["请吃点儿米饭。", "他吃了很多，已经饱了。", "她喜欢吃辣的食物。"]}, {"front": "出租车", "back": "出租车 [chūzūchē]", "examples": ["我们坐出租车去火车站。", "下雨了，我们打出租车回家吧。", "出租车司机把我送到了目的地。"]}, {"front": "大", "back": "大 [dà]", "examples": ["这个苹果很大。", "这个城市很大，我住了三年还不熟悉。", "他有一个大梦想，希望有一天能实现。"]}, {"front": "打电话", "back": "打电话 [dǎ diànhuà]", "examples": ["他在打电话呢。", "我每天晚上给妈妈打电话。", "有什么事情随时打电话给我。"]}, {"front": "的", "back": "的 [de]", "examples": ["这是我的书。", "这是我妈妈买的衣服。", "她穿的那件红色的衣服很好看。"]}, {"front": "点", "back": "点 [diǎn]", "examples": ["现在是下午3点20。", "我们约好下午两点在学校门口见面。", "请大家注意，下午三点有一个会议。"]}, {"front": "电脑", "back": "电脑 [diànnǎo]", "examples": ["我买了个电脑。", "我用电脑学习汉语。", "她的电脑坏了，需要去修一下。"]}, {"front": "电视", "back": "电视 [diànshì]", "examples": ["妈妈在看电视。", "晚饭后，我们一起看电视。", "这个节目在电视上播出，很受欢迎。"]}, {"front": "电影", "back": "电影 [diànyǐng]", "examples": ["我喜欢看电影。", "这部电影真的很好看。", "他们每周末都去电影院看一部电影。"]}, {"front": "东西", "back": "东西 [dōngxi]", "examples": ["我在商店买了很多东西。", "桌子上的东西都是我的。", "这个东西很贵，我买不起。"]}, {"fro  "总是", "back": "总是 [zǒngshì]", "examples": ["他总是比我先到学校。", "她总是微笑着，让人觉得很温暖。", "她总是把别人放在第一位，是个非常体贴的人。"]}, {"front": "嘴", "back": "嘴 [zuǐ]", "examples": ["他嘴角带着微笑。", "他嘴甜，很会说话，大家都喜欢他。", "她嘴上说不在乎，但心里其实很感动。"]}, {"front": "最后", "back": "最后 [zuìhòu]", "examples": ["最后，他终于找到了答案。", "这是最后一次机会，不能再失败了。", "最后，她用行动证明了自己的价值。"]}, {"front": "最近", "back": "最近 [zuìjìn]", "examples": ["最近天气变冷了。", "最近他工作很忙，没什么时间休息。", "最近她的状态很好，精力充沛。"]}, {"front": "作业", "back": "作业 [zuòyè]", "examples": ["我做完作业才能出去玩。", "老师布置的作业很多，要花很长时间。", "她认认真真地完成了每一份作业。"]}, {"front": "中文", "back": "中文 [Zhōngwén]", "examples": ["他能用中文写信了。", "她的中文越来越好，可以看中文书了。", "她的中文写作水平令人惊叹，词句优美。"]}, {"front": "饱", "back": "饱 [bǎo]", "examples": ["我吃饱了，不用再盛了。", "他吃了很多，已经吃饱了。", "她吃饱了，满足地笑了笑。"]}, {"front": "半", "back": "半 [bàn]", "examples": ["现在是三点半。", "我们半小时后在地铁站见面。", "她用了不到半年时间，完成了别人需要一年的工作。"]}, {"front": "层", "back": "层 [céng]", "examples": ["我住在这栋楼的五层。", "这栋楼一共有二十层。", "她爬到了最高一层，俯瞰着整个城市。"]}, {"front": "花", "back": "花 [huā]", "examples": ["桌子上放着一束花。", "她喜欢在家里养花。", "她的努力开出了美丽的花，结出了丰硕的果实。"]}]};
let level = 'hsk1', deck = [], idx = 0, flipped = false;
let isShuffled = false;

function parsePinyin(back) {
  const m = back.match(/\[(.+)\]$/);
  return m ? m[1] : '';
}
function setLevel(l, btn) {
  level = l;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.tab[data-level="${l}"]`).classList.add('active');
  deck = [...RAW[l]]; idx = 0; isShuffled = false;
  showCard();
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
}
function showCard() {
  flipped = false;
  const inner = document.getElementById('cardInner');
  inner.style.transition = 'none';
  inner.classList.remove('flipped');
  // 다음 프레임에서 transition 복구 (이중 호출 방지)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { inner.style.transition = ''; });
  });
  const card = deck[idx];
  document.getElementById('cardFront').textContent = card.front;
  document.getElementById('cardBackHanzi').textContent = card.front;
  document.getElementById('cardBackPinyin').textContent = parsePinyin(card.back);
  const examples = card.examples.filter(e => e);
  const exIdx = (isShuffled && examples.length > 0)
    ? Math.floor(Math.random() * examples.length)
    : 0;
  document.getElementById('cardExample').textContent = examples[exIdx] || '';
  const pct = Math.round((idx + 1) / deck.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${deck.length}`;
}
function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}
function copyExample(e) {
  e.stopPropagation();
  const text = document.getElementById('cardExample').textContent;
  if (!text) return;
  const el = document.getElementById('cardExample');
  navigator.clipboard.writeText(text)
    .then(() => {
      el.style.color = '#2e75b6';
      setTimeout(() => { el.style.color = ''; }, 600);
    })
    .catch(() => {
      // clipboard 미지원 환경 대비 fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      el.style.color = '#2e75b6';
      setTimeout(() => { el.style.color = ''; }, 600);
    });
}
function nextCard() {
  if (idx < deck.length - 1) { idx++; showCard(); } else showDone();
}
function prevCard() {
  if (idx > 0) { idx--; showCard(); }
}
function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; isShuffled = true; showCard();
}
function showDone() {
  document.getElementById('cardArea').style.display = 'none';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = 'none');
  document.querySelector('.progress-bar').style.display = 'none';
  document.querySelector('.progress-text').style.display = 'none';
  const names = {hsk1:'HSK 1급', hsk2:'HSK 2급', hsk3:'HSK 3급'};
  document.getElementById('doneText').textContent = `${names[level]} 단어 ${deck.length}개를 모두 학습했습니다!`;
  document.getElementById('doneScreen').style.display = 'flex';
}
function restart() {
  deck = [...RAW[level]]; idx = 0; isShuffled = false;
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.querySelectorAll('.nav-btns button, .shuffle-btn').forEach(b => b.style.display = '');
  document.querySelector('.progress-bar').style.display = '';
  document.querySelector('.progress-text').style.display = '';
  showCard();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
let touchX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { if (dx < 0) nextCard(); else prevCard(); }
}, {passive: true});
setLevel('hsk1', document.querySelector('.tab[data-level="hsk1"]'));
</script>
